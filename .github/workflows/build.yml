name: Build Rapit Client

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install Gradle 2.14
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '2.14'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 2.14

      - name: Cache Gradle & ForgeGradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Forge decompiled workspace
        run: ./gradlew setupDecompWorkspace --stacktrace

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: RapitClient-jar
          path: build/libs/*.jar
